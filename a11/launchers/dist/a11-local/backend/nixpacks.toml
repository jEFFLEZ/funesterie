[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.virtualenv", "stdenv.cc.cc.lib"]

[phases.install]
cmds = [
	"npm install",
	"python3 -m venv /opt/venv",
	"/opt/venv/bin/python -m ensurepip --upgrade || true",
	"/opt/venv/bin/pip --version",
	"/opt/venv/bin/pip install --no-cache-dir piper-tts"
]

[phases.build]
cmds = ["echo 'no build step'"]

[start]
cmd = "bash start.sh"
