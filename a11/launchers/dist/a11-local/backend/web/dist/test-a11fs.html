<!DOCTYPE html>
<html>
<head>
    <title>A11 Host API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #252526;
            border-left: 3px solid #007acc;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            background: #007acc;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #005a9e;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .info { color: #dcdcaa; }
    </style>
</head>
<body>
    <h1>🔥 A11 Mode 3 - Host API Test</h1>
    <p>Ce fichier teste l'API <code>a11fs</code> exposée par le VSIX.</p>

    <div class="test-section">
        <h3>1. Vérification disponibilité API</h3>
        <button onclick="testAPIAvailable()">Test API Available</button>
        <div id="api-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>2. Workspace Root</h3>
        <button onclick="testWorkspaceRoot()">Get Workspace Root</button>
        <div id="workspace-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>3. Lire fichier README.md</h3>
        <button onclick="testReadFile()">Read README.md</button>
        <div id="read-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>4. Liste documents ouverts</h3>
        <button onclick="testGetOpenDocuments()">Get Open Documents</button>
        <div id="docs-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>5. Ouvrir fichier A11Package.cs</h3>
        <button onclick="testOpenFile()">Open A11Package.cs</button>
        <div id="open-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>6. Exécuter commande shell</h3>
        <button onclick="testShellCommand()">Execute: git status</button>
        <div id="shell-result" class="result"></div>
    </div>

    <script>
        function log(elementId, message, type = 'info') {
            const el = document.getElementById(elementId);
            el.className = `result ${type}`;
            el.textContent = message;
        }

        // Helper pour vérifier que l'API est disponible
        function getA11fs() {
            if (!window.chrome) {
                return null;
            }
            if (!window.chrome.webview) {
                return null;
            }
            if (!window.chrome.webview.hostObjects) {
                return null;
            }
            return window.chrome.webview.hostObjects.a11fs || null;
        }

        async function testAPIAvailable() {
            try {
                const a11fs = getA11fs();
                if (a11fs) {
                    log('api-result', '✅ API a11fs disponible!', 'success');
                } else {
                    log('api-result', '❌ API a11fs NON disponible (pas dans WebView2 ou pas enregistrée)', 'error');
                }
            } catch (err) {
                log('api-result', `❌ Erreur: ${err}`, 'error');
            }
        }

        async function testWorkspaceRoot() {
            try {
                const a11fs = getA11fs();
                if (!a11fs) {
                    log('workspace-result', '❌ API non disponible', 'error');
                    return;
                }
                
                const root = await a11fs.GetWorkspaceRoot();
                log('workspace-result', `✅ Workspace root: ${root}`, 'success');
            } catch (err) {
                log('workspace-result', `❌ Erreur: ${err}`, 'error');
            }
        }

        async function testReadFile() {
            try {
                const a11fs = getA11fs();
                if (!a11fs) {
                    log('read-result', '❌ API non disponible', 'error');
                    return;
                }
                
                const root = await a11fs.GetWorkspaceRoot();
                const readmePath = `${root}\\README.md`;
                const content = await a11fs.ReadFile(readmePath);
                
                if (content) {
                    const preview = content.substring(0, 300) + '...';
                    log('read-result', `✅ README.md lu avec succès:\n\n${preview}`, 'success');
                } else {
                    log('read-result', `⚠️ Fichier README.md introuvable à ${readmePath}`, 'error');
                }
            } catch (err) {
                log('read-result', `❌ Erreur: ${err}`, 'error');
            }
        }

        async function testGetOpenDocuments() {
            try {
                const a11fs = getA11fs();
                if (!a11fs) {
                    log('docs-result', '❌ API non disponible', 'error');
                    return;
                }
                
                const docs = await a11fs.GetOpenDocuments();
                const docList = docs.join('\n');
                log('docs-result', `✅ Documents ouverts (${docs.length}):\n\n${docList}`, 'success');
            } catch (err) {
                log('docs-result', `❌ Erreur: ${err}`, 'error');
            }
        }

        async function testOpenFile() {
            try {
                const a11fs = getA11fs();
                if (!a11fs) {
                    log('open-result', '❌ API non disponible', 'error');
                    return;
                }
                
                const root = await a11fs.GetWorkspaceRoot();
                const filePath = `${root}\\A11.VisualStudio\\A11.VsixHost\\A11Package.cs`;
                const success = await a11fs.OpenFile(filePath);
                
                if (success) {
                    log('open-result', `✅ Fichier ouvert: ${filePath}`, 'success');
                } else {
                    log('open-result', `❌ Échec ouverture fichier`, 'error');
                }
            } catch (err) {
                log('open-result', `❌ Erreur: ${err}`, 'error');
            }
        }

        async function testShellCommand() {
            try {
                const a11fs = getA11fs();
                if (!a11fs) {
                    log('shell-result', '❌ API non disponible', 'error');
                    return;
                }
                
                log('shell-result', '⏳ Exécution git status...', 'info');
                const output = await a11fs.ExecuteShell('git status');
                log('shell-result', `✅ Sortie:\n\n${output}`, 'success');
            } catch (err) {
                log('shell-result', `❌ Erreur: ${err}`, 'error');
            }
        }

        // Auto-test au chargement
        window.addEventListener('load', () => {
            testAPIAvailable();
        });
    </script>
</body>
</html>
