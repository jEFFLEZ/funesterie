<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>A-11 / Qflush UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  </head>
  <body>
    <div id="container">
      <div id="avatar-panel">
        <img id="avatar" src="avatar.png" alt="Avatar" />
      </div>
      <div id="main-panel">
        <div id="chats"></div>
        <div id="log-panel">
          <div id="log"></div>
        </div>
        <div id="chat-panel">
          <div id="chat"></div>
        </div>
        <div id="input-panel">
          <form id="composerForm">
            <input id="input" type="text" placeholder="Écrivez ici..." autocomplete="off" />
            <button id="send">Envoyer</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
